<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Ads Restaurantes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      color: white;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0 15px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #ff7a18, #ff3d00);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .results {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }

    .big {
      grid-column: span 2;
      font-size: 18px;
      font-weight: bold;
    }

    .status {
      margin-top: 15px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🍔 Calculadora Ads para Restaurantes</h2>

  <label>Presupuesto Ads ($)</label>
  <input type="number" id="presupuesto">

  <label>Costo por clic (CPC)</label>
  <input type="number" id="cpc">

  <label>Tasa de conversión (%)</label>
  <input type="number" id="conversion">

  <label>Ticket promedio ($)</label>
  <input type="number" id="ticket">

  <button onclick="calcular()">Calcular resultados</button>

  <div class="results" id="results"></div>
  <div class="status" id="status"></div>
</div>

<script>
function calcular() {
  let presupuesto = parseFloat(document.getElementById("presupuesto").value);
  let cpc = parseFloat(document.getElementById("cpc").value);
  let conversion = parseFloat(document.getElementById("conversion").value) / 100;
  let ticket = parseFloat(document.getElementById("ticket").value);

  if (!presupuesto || !cpc || !conversion || !ticket) {
    alert("Completa todos los campos");
    return;
  }

  let clics = presupuesto / cpc;
  let pedidos = clics * conversion;
  let ventas = pedidos * ticket;
  let roas = ventas / presupuesto;

  let statusText = "";
  if (roas < 1) {
    statusText = "❌ Estás perdiendo dinero en publicidad";
  } else if (roas >= 1 && roas < 3) {
    statusText = "⚠️ Puedes optimizar tus campañas";
  } else {
    statusText = "🔥 Campaña rentable, puedes escalar";
  }

  document.getElementById("results").innerHTML = `
    <div class="card">Clics<br><strong>${clics.toFixed(0)}</strong></div>
    <div class="card">Pedidos<br><strong>${pedidos.toFixed(0)}</strong></div>
    <div class="card">Ventas<br><strong>$${ventas.toLocaleString()}</strong></div>
    <div class="card">ROAS<br><strong>${roas.toFixed(2)}x</strong></div>
    <div class="card big">Inversión: $${presupuesto.toLocaleString()}</div>
  `;

  document.getElementById("status").innerText = statusText;
}
</script>

</body>
</html>
