<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Ads</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 16px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px 0;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #ff7a18, #ff3d00);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .results {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }

    .big {
      grid-column: span 2;
    }

    .status {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    .recommendation {
      margin-top: 15px;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🍔 Calculadora Ads</h2>

  <label>Presupuesto Ads ($)</label>
  <input type="text" id="presupuesto" oninput="formatearInput(this)">

  <label>Costo por clic (CPC)</label>
  <input type="text" id="cpc" oninput="formatearInput(this)">

  <label>Tasa de conversión (%)</label>
  <input type="number" id="conversion">

  <label>Ticket promedio ($)</label>
  <input type="text" id="ticket" oninput="formatearInput(this)">

  <button onclick="calcular()">Calcular</button>

  <div class="results" id="results"></div>
  <div class="status" id="status"></div>
  <div class="recommendation" id="recommendation"></div>
</div>

<script>

// FORMATO PESOS EN INPUT
function formatearInput(input) {
  let valor = input.value.replace(/\./g, "").replace(/\D/g, "");
  input.value = new Intl.NumberFormat("es-CO").format(valor);
}

// LIMPIAR FORMATO PARA CALCULAR
function limpiarNumero(valor) {
  return parseFloat(valor.replace(/\./g, ""));
}

function formatoCOP(num) {
  return new Intl.NumberFormat("es-CO").format(num);
}

function calcular() {
  let presupuesto = limpiarNumero(document.getElementById("presupuesto").value);
  let cpc = limpiarNumero(document.getElementById("cpc").value);
  let conversionInput = parseFloat(document.getElementById("conversion").value);
  let conversion = conversionInput / 100;
  let ticket = limpiarNumero(document.getElementById("ticket").value);

  if (!presupuesto || !cpc || !conversion || !ticket) {
    alert("Completa todos los campos");
    return;
  }

  let clics = presupuesto / cpc;
  let pedidos = clics * conversion;
  let ventas = pedidos * ticket;
  let roas = ventas / presupuesto;

  // CONVERSIÓN NECESARIA PARA ROAS 3
  let conversionNecesaria = (3 * cpc) / ticket;
  let conversionNecesariaPct = (conversionNecesaria * 100).toFixed(2);

  // STATUS
  let statusText = "";
  if (roas < 1) {
    statusText = "❌ Estás perdiendo dinero";
  } else if (roas < 3) {
    statusText = "⚠️ No es rentable aún (ROAS < 3)";
  } else {
    statusText = "🔥 Rentable, escala agresivo";
  }

  document.getElementById("results").innerHTML = `
    <div class="card">Clics<br><strong>${clics.toFixed(0)}</strong></div>
    <div class="card">Pedidos<br><strong>${pedidos.toFixed(0)}</strong></div>
    <div class="card">Ventas<br><strong>$${formatoCOP(ventas)}</strong></div>
    <div class="card">ROAS<br><strong>${roas.toFixed(2)}x</strong></div>
    <div class="card big">Inversión: $${formatoCOP(presupuesto)}</div>
  `;

  document.getElementById("status").innerText = statusText;

  // RECOMENDACIÓN INTELIGENTE
  let mensaje = "";

  if (conversion < conversionNecesaria) {
    mensaje = `
    Tu conversión actual es <strong>${conversionInput}%</strong><br><br>

    Para que este presupuesto sea rentable (ROAS ≥ 3), necesitas mínimo <strong>${conversionNecesariaPct}%</strong><br><br>

    🚨 Recomendaciones:<br>
    - Optimiza tu menú (menos opciones, más claridad)<br>
    - Crea descuentos en productos más vendidos<br>
    - Mejora fotos y descripciones<br>
    - Usa combos para aumentar conversión<br>
    `;
  } else {
    mensaje = `
    Tu conversión actual es <strong>${conversionInput}%</strong><br>
    Estás por encima del mínimo (${conversionNecesariaPct}%)<br><br>

    🚀 Puedes escalar inversión con seguridad
    `;
  }

  document.getElementById("recommendation").innerHTML = mensaje;
}

</script>

</body>
</html>
